<svg xmlns="http://www.w3.org/2000/svg" width="520" height="680" viewBox="0 0 520 680" role="img" aria-labelledby="title desc">
  <title id="title">codexU status bar runtime menu</title>
  <desc id="desc">A macOS status bar popover with Codex and Claude Code runtime cards, showing 5-hour quota, 7-day quota, and today's token usage.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2B0C81"/>
      <stop offset="0.48" stop-color="#7B42D6"/>
      <stop offset="1" stop-color="#17143F"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4E9FF" stop-opacity="0.82"/>
      <stop offset="0.58" stop-color="#D9C2FF" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#B388FF" stop-opacity="0.58"/>
    </linearGradient>
    <linearGradient id="cardGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.74"/>
      <stop offset="1" stop-color="#EBDFFF" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1497FF"/>
      <stop offset="1" stop-color="#7F67FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#140B3B" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="520" height="680" fill="url(#pageBg)"/>

  <rect x="0" y="0" width="520" height="38" fill="#F7F1FF" opacity="0.88"/>
  <text x="28" y="24" fill="#2C2252" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="13" font-weight="600">Finder</text>
  <circle cx="388" cy="19" r="7" fill="#7E5BFF" opacity="0.82"/>
  <rect x="406" y="11" width="42" height="16" rx="8" fill="#7E5BFF" opacity="0.18"/>
  <text x="418" y="23" fill="#2C2252" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="700">codexU</text>
  <text x="464" y="24" fill="#2C2252" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="12" font-weight="600">02:27</text>

  <path d="M420 38 L404 58 L436 58 Z" fill="#F1E6FF" opacity="0.92"/>
  <rect x="70" y="56" width="380" height="548" rx="22" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.55" filter="url(#shadow)"/>

  <g transform="translate(92 82)">
    <circle cx="18" cy="18" r="18" fill="#FFFFFF" opacity="0.72"/>
    <rect x="8" y="12" width="20" height="14" rx="7" fill="#7866FF"/>
    <circle cx="14" cy="19" r="4" fill="#48A6FF"/>
    <circle cx="22" cy="19" r="4" fill="#FF9D2E"/>
    <text x="48" y="22" fill="#130C2A" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif" font-size="22" font-weight="750">codexU</text>
    <text x="214" y="14" fill="#5A4D7D" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="10" font-weight="600">刷新 02:27</text>
    <rect x="290" y="2" width="38" height="30" rx="9" fill="#FFFFFF" opacity="0.45"/>
    <text x="303" y="22" fill="#5A4D7D" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="15" font-weight="700">↻</text>
  </g>

  <g transform="translate(92 138)">
    <rect width="336" height="142" rx="12" fill="url(#cardGlass)" stroke="#FFFFFF" stroke-opacity="0.62"/>
    <text x="18" y="30" fill="#130C2A" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="18" font-weight="750">Codex</text>
    <rect x="268" y="13" width="50" height="24" rx="12" fill="#2FBA6C" opacity="0.16"/>
    <text x="282" y="29" fill="#1D8B4D" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="12" font-weight="700">可用</text>

    <text x="18" y="65" fill="#62537F" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="650">5小时剩余</text>
    <text x="18" y="91" fill="#130C2A" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif" font-size="28" font-weight="800">65%</text>
    <rect x="18" y="104" width="130" height="7" rx="4" fill="#CEC1ED"/>
    <rect x="18" y="104" width="84" height="7" rx="4" fill="url(#blueBar)"/>
    <text x="18" y="129" fill="#5A4D7D" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="600">重置 05:03</text>

    <text x="178" y="65" fill="#62537F" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="650">7日剩余</text>
    <text x="178" y="91" fill="#130C2A" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif" font-size="28" font-weight="800">66%</text>
    <rect x="178" y="104" width="130" height="7" rx="4" fill="#CEC1ED"/>
    <rect x="178" y="104" width="86" height="7" rx="4" fill="#8C7BFF"/>
    <text x="178" y="129" fill="#5A4D7D" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="600">重置 7/7 10:40</text>

    <text x="238" y="88" fill="#130C2A" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="650" opacity="0">spacer</text>
  </g>

  <g transform="translate(92 296)">
    <rect width="336" height="142" rx="12" fill="url(#cardGlass)" stroke="#FFFFFF" stroke-opacity="0.62"/>
    <text x="18" y="30" fill="#130C2A" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="18" font-weight="750">Claude Code</text>
    <rect x="225" y="13" width="93" height="24" rx="12" fill="#F59E0B" opacity="0.17"/>
    <text x="239" y="29" fill="#A46208" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="12" font-weight="700">需要快照</text>

    <text x="18" y="65" fill="#62537F" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="650">5小时剩余</text>
    <text x="18" y="91" fill="#130C2A" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif" font-size="28" font-weight="800">--</text>
    <rect x="18" y="104" width="130" height="7" rx="4" fill="#CEC1ED"/>
    <text x="18" y="129" fill="#5A4D7D" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="600">等待 active snapshot</text>

    <text x="178" y="65" fill="#62537F" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="650">7日剩余</text>
    <text x="178" y="91" fill="#130C2A" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif" font-size="28" font-weight="800">--</text>
    <rect x="178" y="104" width="130" height="7" rx="4" fill="#CEC1ED"/>
    <text x="178" y="129" fill="#5A4D7D" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="600">打开 Claude 后刷新</text>
  </g>

  <g transform="translate(92 454)">
    <rect width="336" height="64" rx="12" fill="#FFFFFF" opacity="0.44" stroke="#FFFFFF" stroke-opacity="0.42"/>
    <text x="18" y="25" fill="#62537F" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="650">今日总 token</text>
    <text x="18" y="50" fill="#130C2A" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif" font-size="24" font-weight="800">86.2M</text>
    <text x="218" y="29" fill="#5A4D7D" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="600">Codex 61.4M</text>
    <text x="218" y="49" fill="#5A4D7D" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="11" font-weight="600">Claude 24.8M</text>
  </g>

  <g transform="translate(92 536)">
    <rect width="232" height="38" rx="10" fill="#7C63FF"/>
    <text x="76" y="25" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="13" font-weight="750">打开主界面</text>
    <rect x="244" y="0" width="92" height="38" rx="10" fill="#FFFFFF" opacity="0.42"/>
    <text x="278" y="25" fill="#4B3E70" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif" font-size="13" font-weight="700">退出</text>
  </g>
</svg>
